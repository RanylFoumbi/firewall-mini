name: CI/CD                                                                                                                       
                                                                                                                                  
  on:
    push:
      branches: [master]
    pull_request:                                                                                                                   
      branches: [master]
                                                                                                                                    
  jobs:                                                                                                                           
    lint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5                                                                                             
          with:
            python-version: "3.11"                                                                                                  
        - run: pip install ruff                                                                                                   
        - run: ruff check .                                                                                                         
   
    test:                                                                                                                           
      runs-on: ubuntu-latest                                                                                                      
      needs: lint
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:                                                                                                                     
            python-version: "3.11"
        - run: pip install -r requirements.txt                                                                                      
        - run: pytest tests/unit/ -v                                                                                              
                                                                                                                                    
    deploy:
      runs-on: ubuntu-latest                                                                                                        
      needs: test                                                                                                                 
      if: github.ref == 'refs/heads/master'
      permissions:
        contents: read
        id-token: write
                                                                                                                                    
      steps:
        - uses: actions/checkout@v4                                                                                                 
                                                                                                                                  
        - id: auth
          uses: google-github-actions/auth@v2
          with:                                                                                                                     
            workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
            service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}                                                                     
                                                                                                                                    
        - uses: google-github-actions/setup-gcloud@v2
                                                                                                                                    
        - run: gcloud auth configure-docker europe-west1-docker.pkg.dev                                                             
   
        - name: Build and push                                                                                                      
          run: |                                                                                                                  
            docker build -t europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/firewall-mini/firewall-mini:${{ github.sha }} 
  .                                                                                                                                 
            docker push europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/firewall-mini/firewall-mini:${{ github.sha }}
                                                                                                                                    
        - name: Deploy to Cloud Run                                                                                                 
          run: |
            gcloud run deploy firewall-mini \                                                                                       
              --image=europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/firewall-mini/firewall-mini:${{ github.sha }} \   
              --region=europe-west1 \                                                                                               
              --platform=managed \
              --allow-unauthenticated  